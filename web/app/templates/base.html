<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Mohammad Ariful Islam | Senior AI Python Engineer{% endblock %}</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/custom.css') }}" />
</head>
<body>

  <!-- ─── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
    <div class="container">

      <!-- Brand: logo mark + email -->
      <div class="d-flex align-items-center gap-2 me-4">
        <a href="/" class="brand-mark text-decoration-none">A</a>
        <span class="brand-email d-none d-lg-block">aizamitukallul@gmail.com</span>
      </div>

      <!-- Hamburger -->
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links + CTA -->
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto align-items-center gap-1">
          <li class="nav-item"><a class="nav-link" href="/#hero">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="/#skills">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="/#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="/#experience">Experience</a></li>
          <li class="nav-item"><a class="nav-link" href="/#contact">Contact</a></li>
        </ul>
        <a href="#contact" class="btn-resume ms-lg-3">
          Resume <i class="fas fa-download ms-1" style="font-size:.75rem;"></i>
        </a>
      </div>

    </div>
  </nav>

  <!-- ─── Page content ────────────────────────────────────────── -->
  <main>{% block content %}{% endblock %}</main>

  <!-- ─── Footer ──────────────────────────────────────────────── -->
  <footer>
    <div class="container">
      <div class="row align-items-center py-4">
        <div class="col-md-4 mb-3 mb-md-0">
          <div class="footer-logo">Aiza<span style="color:var(--primary)">.</span></div>
        </div>
        <div class="col-md-4 text-center mb-3 mb-md-0">
          <small>&copy; 2026 Mohammad Ariful Islam. All rights reserved.</small>
        </div>
        <div class="col-md-4 text-md-end">
          <a href="https://github.com/kallul" class="footer-social me-3" aria-label="GitHub" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
          <a href="https://www.linkedin.com/in/eowynaiza/" class="footer-social me-3" aria-label="LinkedIn" target="_blank" rel="noopener"><i class="fab fa-linkedin-in"></i></a>
          <a href="mailto:aizamitukallul@gmail.com" class="footer-social" aria-label="Email"><i class="far fa-envelope"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
